<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKUNIN Temp Email</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] }, colors: { brand: { DEFAULT: '#3b82f6', dark: '#2563eb' } } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .toast-active { transform: translateY(0); opacity: 1; }
        .toast-enter { transform: translateY(100%); opacity: 0; }
        iframe { background: white; width: 100%; height: 100%; border: none; }
        .view-transition { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-200 min-h-screen p-3 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- HEADER -->
        <div class="flex justify-between items-center px-2">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                <div class="bg-brand p-1.5 rounded-lg text-white"><i class="fa-solid fa-envelope-open-text"></i></div>
                AKUNIN <span class="text-brand">TEMP</span>
            </h1>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-white dark:bg-slate-900 border dark:border-slate-800 flex items-center justify-center text-yellow-500 shadow-sm">
                <i id="themeIcon" class="fa-solid fa-moon"></i>
            </button>
        </div>

        <!-- MODE 1: SETUP VIEW (Hanya muncul jika belum ada email) -->
        <div id="setupView" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-3xl shadow-xl space-y-6">
            <div class="text-center space-y-2">
                <h2 class="text-lg font-bold">Buat Alamat Email Baru</h2>
                <p class="text-xs text-slate-500">Gunakan domain premium untuk verifikasi instan.</p>
            </div>
            
            <div class="flex flex-col gap-3">
                <div class="flex gap-2">
                    <input type="text" id="username" class="flex-1 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-brand text-sm" placeholder="Masukkan username...">
                    <select id="domain" class="w-2/5 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl px-2 py-3 outline-none text-xs cursor-pointer">
                        <option value="akunin.my.id">@akunin.my.id</option>
                        <option value="akunin.biz.id">@akunin.biz.id</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="startSession()" class="bg-brand hover:bg-brand-dark text-white py-3 rounded-xl font-bold text-sm shadow-lg shadow-brand/20 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus"></i> Buat Email
                    </button>
                    <button onclick="genRandomEmail()" class="bg-slate-100 dark:bg-slate-800 py-3 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-shuffle"></i> Acak
                    </button>
                </div>
            </div>
        </div>

        <!-- MODE 2: ACTIVE INBOX VIEW -->
        <div id="activeView" class="hidden space-y-6">
            <!-- Info Email & Toolbar -->
            <div class="bg-white dark:bg-slate-900 border dark:border-slate-800 p-5 rounded-3xl shadow-lg">
                <div class="text-center mb-4">
                    <p class="text-[10px] uppercase tracking-widest text-slate-500 mb-1 font-bold">Email Aktif Anda</p>
                    <h2 id="displayEmail" class="text-lg md:text-xl font-mono font-bold text-brand break-all">...</h2>
                </div>
                
                <!-- 4 Tombol Utama -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <button onclick="copyEmail()" class="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl text-xs font-bold flex flex-col items-center gap-1 hover:bg-brand hover:text-white transition-all">
                        <i class="fa-regular fa-copy text-lg"></i> Salin
                    </button>
                    <button onclick="checkInbox()" class="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl text-xs font-bold flex flex-col items-center gap-1 hover:bg-brand hover:text-white transition-all">
                        <i class="fa-solid fa-arrows-rotate text-lg"></i> Refresh
                    </button>
                    <button onclick="newEmail()" class="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl text-xs font-bold flex flex-col items-center gap-1 hover:bg-emerald-500 hover:text-white transition-all">
                        <i class="fa-solid fa-plus-square text-lg"></i> New
                    </button>
                    <button onclick="deleteSession()" class="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl text-xs font-bold flex flex-col items-center gap-1 hover:bg-red-500 hover:text-white transition-all">
                        <i class="fa-solid fa-trash-can text-lg"></i> Delete
                    </button>
                </div>
            </div>

            <!-- Pesan Masuk -->
            <div class="bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-3xl shadow-xl min-h-[400px] flex flex-col overflow-hidden relative">
                <div class="p-4 border-b dark:border-slate-800 flex justify-between items-center bg-slate-50/50 dark:bg-slate-900/50">
                    <span class="text-[10px] font-bold uppercase tracking-widest flex items-center gap-2"><i class="fa-solid fa-inbox text-brand"></i> Kotak Masuk</span>
                    <div id="autoRefreshIndicator" class="w-16 h-1 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                        <div class="h-full bg-brand animate-[progress_3s_linear_infinite]"></div>
                    </div>
                </div>
                <div id="inboxList" class="flex-1 flex flex-col divide-y dark:divide-slate-800">
                    <!-- List Render Here -->
                </div>

                <!-- READER VIEW -->
                <div id="readerView" class="hidden absolute inset-0 bg-white dark:bg-slate-900 z-50 flex flex-col">
                    <div class="p-4 border-b dark:border-slate-800 flex items-center gap-3">
                        <button onclick="closeReader()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"><i class="fa-solid fa-arrow-left"></i></button>
                        <h2 id="msgSubject" class="font-bold truncate text-sm flex-1">...</h2>
                    </div>
                    <div class="p-3 text-[10px] flex justify-between bg-slate-50 dark:bg-slate-800/50">
                        <p class="truncate mr-2">Dari: <span id="msgFrom" class="text-brand font-bold">...</span></p>
                        <p id="msgDate" class="text-slate-400 shrink-0">...</p>
                    </div>
                    <div class="flex-1 bg-white">
                        <iframe id="msgBody" sandbox="allow-same-origin"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl text-white text-xs font-bold shadow-2xl transition-all duration-300 toast-enter z-[100] flex items-center gap-2">
        <i class="fa-solid fa-bell"></i> <span id="toastMsg"></span>
    </div>

    <script>
        const WORKER_URL = "https://akunin-mail-api.akuninpremiumstore.workers.dev";
        let currentEmail = localStorage.getItem('last_akunin_email') || "";
        let checkInterval;

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('themeIcon').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }
        if (localStorage.theme === 'light') toggleTheme();

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.className = `fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl text-white text-xs font-bold shadow-2xl transition-all duration-300 z-[100] flex items-center gap-2 toast-active ${type === 'error' ? 'bg-red-500' : 'bg-slate-900'}`;
            setTimeout(() => t.classList.replace('toast-active', 'toast-enter'), 3000);
        }

        function genRandomEmail() {
            document.getElementById('username').value = Math.random().toString(36).substring(2, 10);
        }

        async function startSession(forceEmail = null) {
            let target;
            let isDeepLink = false;

            if (forceEmail) {
                target = forceEmail;
                isDeepLink = true;
            } else {
                const u = document.getElementById('username').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
                const d = document.getElementById('domain').value;
                if (!u) return showToast("Isi username!", "error");
                target = `${u}@${d}`;
            }

            // Jika ini email baru (bukan reload/deep link), cek ketersediaan
            if (!forceEmail && target !== localStorage.getItem('last_akunin_email')) {
                showToast("Mendaftarkan email...");
                try {
                    const res = await fetch(`${WORKER_URL}?action=lock&email=${target}`);
                    const data = await res.json();
                    if (data.status === "taken") return showToast("Email sudah digunakan!", "error");
                } catch (e) { return showToast("Gagal koneksi", "error"); }
            }

            currentEmail = target;
            localStorage.setItem('last_akunin_email', currentEmail);
            renderView();
        }

        function renderView() {
            if (currentEmail) {
                document.getElementById('setupView').classList.add('hidden');
                document.getElementById('activeView').classList.remove('hidden');
                document.getElementById('displayEmail').innerText = currentEmail;
                startAutoRefresh();
            } else {
                document.getElementById('setupView').classList.remove('hidden');
                document.getElementById('activeView').classList.add('hidden');
                clearInterval(checkInterval);
            }
        }

        function newEmail() {
            if(confirm("Buka sesi baru? Email ini akan tetap aktif di background.")) {
                currentEmail = "";
                localStorage.removeItem('last_akunin_email');
                renderView();
            }
        }

        async function deleteSession() {
            if (!confirm("Hapus total email ini? Pesan akan hilang selamanya.")) return;
            try {
                showToast("Menghapus...");
                await fetch(`${WORKER_URL}?action=delete&email=${currentEmail}`);
                currentEmail = "";
                localStorage.removeItem('last_akunin_email');
                renderView();
            } catch (e) { showToast("Gagal hapus", "error"); }
        }

        function startAutoRefresh() {
            clearInterval(checkInterval);
            checkInbox();
            // Refresh lebih cepat: 3 detik
            checkInterval = setInterval(() => { if (!document.hidden) checkInbox(); }, 3000);
        }

        async function checkInbox() {
            try {
                const res = await fetch(`${WORKER_URL}?email=${currentEmail}`);
                const m = await res.json();
                const list = document.getElementById('inboxList');
                if (m.length === 0) {
                    list.innerHTML = `<div class="flex flex-col items-center justify-center h-64 text-slate-400 animate-pulse"><i class="fa-solid fa-spinner fa-spin text-xl mb-2"></i><p class="text-[10px] font-bold">MENUNGGU PESAN...</p></div>`;
                } else {
                    list.innerHTML = m.map(msg => `
                        <div onclick="readEmail('${msg.id}')" class="p-4 hover:bg-brand/5 cursor-pointer flex justify-between items-center transition-all border-l-4 border-transparent hover:border-brand">
                            <div class="min-w-0 flex-1">
                                <p class="text-brand font-bold text-[11px] truncate">${msg.from}</p>
                                <p class="text-[13px] font-semibold truncate mt-0.5 dark:text-slate-200">${msg.subject}</p>
                            </div>
                            <span class="text-[9px] text-slate-400 font-mono ml-4 shrink-0">${msg.date.split(',')[0]}</span>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        async function readEmail(id) {
            showToast("Memuat...");
            try {
                const res = await fetch(`${WORKER_URL}?email=${currentEmail}`);
                const m = await res.json();
                const det = m.find(x => x.id === id);
                document.getElementById('readerView').classList.remove('hidden');
                document.getElementById('msgSubject').innerText = det.subject;
                document.getElementById('msgFrom').innerText = det.from;
                document.getElementById('msgDate').innerText = det.date;
                document.getElementById('msgBody').srcdoc = `<html><head><style>body{font-family:sans-serif;margin:15px;line-height:1.5;font-size:14px;color:#333}img{max-width:100%;height:auto;}</style></head><body>${det.html}</body></html>`;
            } catch (e) { showToast("Gagal muat", "error"); }
        }

        function closeReader() { document.getElementById('readerView').classList.add('hidden'); }
        function copyEmail() { navigator.clipboard.writeText(currentEmail); showToast("Disalin!"); }

        window.onload = () => {
            // 1. Prioritas: Cek Deep Link (/webmail/...)
            const path = window.location.pathname;
            if (path.startsWith('/webmail/')) {
                let raw = decodeURIComponent(path.split('/webmail/')[1]);
                if (raw) {
                    const fullMail = raw.includes('@') ? raw : `${raw}@akunin.my.id`;
                    startSession(fullMail);
                    return;
                }
            }
            
            // 2. Cek Session Terakhir
            if (currentEmail) {
                renderView();
            } else {
                renderView();
            }
        };
    </script>
</body>
</html>
