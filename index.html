<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKUNIN Temp Email</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] }, colors: { brand: { light: '#60a5fa', DEFAULT: '#3b82f6', dark: '#2563eb' } }, animation: { 'refresh-bar': 'progress 5s linear infinite' }, keyframes: { progress: { '0%': { width: '0%' }, '100%': { width: '100%' } } } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .toast-active { transform: translateY(0); opacity: 1; }
        .toast-enter { transform: translateY(100%); opacity: 0; }
        input:disabled, select:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-slate-900 dark:text-slate-200 min-h-screen p-4 md:p-8 selection:bg-brand selection:text-white">

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- HEADER -->
        <div class="bg-white dark:bg-slate-800/80 backdrop-blur-md p-6 sm:p-8 rounded-2xl border border-gray-200 dark:border-slate-700/50 shadow-xl relative overflow-hidden transition-all">
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-2xl sm:text-3xl font-bold dark:text-white flex items-center gap-3 tracking-tight">
                        <div class="bg-brand p-2 sm:p-3 rounded-xl text-white shadow-lg shadow-brand/20">
                            <i class="fa-solid fa-envelope-open-text"></i>
                        </div>
                        AKUNIN TEMP
                    </h1>
                    <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-gray-100 dark:bg-slate-700 flex items-center justify-center text-yellow-400 hover:scale-110 transition-transform">
                        <i id="themeIcon" class="fa-solid fa-sun"></i>
                    </button>
                </div>
                
                <div class="mb-6 relative">
                    <div class="relative flex items-center bg-gray-50 dark:bg-slate-950 rounded-xl overflow-hidden border border-gray-200 dark:border-slate-800 transition-all">
                        <input type="text" id="currentEmail" readonly class="bg-transparent w-full p-4 sm:p-5 text-emerald-500 font-mono text-lg sm:text-xl text-center outline-none" value="Siapkan Email Kamu...">
                        <button onclick="copyEmail()" id="copyBtn" class="absolute right-2 top-2 bottom-2 px-6 bg-brand hover:bg-brand-dark text-white rounded-lg flex items-center gap-2 font-medium">
                            <i class="fa-regular fa-copy"></i> <span class="hidden sm:inline">Salin</span>
                        </button>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex-1 flex flex-col sm:flex-row gap-3">
                        <div class="relative flex-1">
                            <i class="fa-regular fa-user absolute left-4 top-3.5 text-gray-400"></i>
                            <input type="text" id="username" class="w-full bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 focus:border-brand rounded-xl pl-11 pr-4 py-3 text-sm focus:outline-none transition-all" placeholder="Username...">
                        </div>
                        <div class="relative w-full sm:w-2/5">
                            <select id="domain" class="w-full appearance-none bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 focus:border-brand rounded-xl px-4 py-3 text-sm focus:outline-none cursor-pointer">
                                <option value="akunin.my.id" selected>@akunin.my.id</option>
                                <option value="akunin.biz.id">@akunin.biz.id</option>
                                <option value="1secmail.com">@1secmail.com</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="flex gap-3 w-full sm:w-auto">
                        <button id="toggleLockBtn" onclick="toggleLock()" class="flex-1 sm:flex-none bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-xl text-sm font-semibold transition-all shadow-md">
                            <i id="lockIcon" class="fa-solid fa-check"></i>
                        </button>
                        <button id="deleteBtn" onclick="deleteSession()" class="hidden flex-1 sm:flex-none bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-xl text-sm font-semibold transition-all shadow-md">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                        <button id="randomBtn" onclick="genRandomEmail()" class="flex-1 sm:flex-none bg-gray-200 dark:bg-slate-700 text-gray-800 dark:text-white px-6 py-3 rounded-xl text-sm font-semibold transition-all group">
                            <i class="fa-solid fa-shuffle group-hover:rotate-180 transition-transform duration-500"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- KOTAK MASUK -->
        <div class="bg-white dark:bg-slate-800/80 backdrop-blur-md rounded-2xl border border-gray-200 dark:border-slate-700/50 shadow-xl overflow-hidden min-h-[500px] flex flex-col relative transition-all">
            <div id="inboxView" class="flex-1 flex flex-col">
                <div class="p-4 bg-gray-50/50 dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700/50 flex justify-between items-center">
                    <span class="text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                        <i class="fa-solid fa-inbox text-brand"></i> Kotak Masuk
                    </span>
                    <div id="refreshStatus" class="hidden w-20 h-1.5 bg-gray-200 dark:bg-slate-700 rounded-full overflow-hidden">
                        <div class="h-full bg-brand animate-refresh-bar" id="refreshBar"></div>
                    </div>
                </div>
                <div id="inboxList" class="flex-1 flex flex-col divide-y divide-gray-100 dark:divide-slate-700/50">
                    <div class="flex-1 flex flex-col items-center justify-center p-10 text-gray-400">
                        <i class="fa-solid fa-lock text-5xl mb-4 opacity-20"></i>
                        <p class="text-sm">Klik centang untuk mengaktifkan email.</p>
                    </div>
                </div>
            </div>

            <!-- READER VIEW (Original Email Style) -->
            <div id="readerView" class="hidden absolute inset-0 bg-white dark:bg-slate-900 z-50 flex flex-col transition-all">
                <div class="p-4 border-b dark:border-slate-800 flex items-center gap-4 bg-gray-50/50 dark:bg-slate-900">
                    <button onclick="closeReader()" class="p-2 hover:bg-gray-200 dark:hover:bg-slate-800 rounded-lg transition-all"><i class="fa-solid fa-arrow-left"></i></button>
                    <h2 id="msgSubject" class="font-bold truncate text-lg flex-1">...</h2>
                </div>
                <div class="p-4 text-xs bg-gray-50 dark:bg-slate-800 flex justify-between border-b dark:border-slate-800">
                    <p>Dari: <span id="msgFrom" class="text-brand font-bold">...</span></p>
                    <p class="text-gray-400" id="msgDate">...</p>
                </div>
                <!-- Iframe untuk tampilan email asli -->
                <iframe id="msgBody" class="flex-1 w-full bg-white border-0" sandbox="allow-same-origin"></iframe>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white text-sm font-bold shadow-xl transition-all duration-300 toast-enter z-[100] flex items-center gap-2">
        <i class="fa-solid fa-circle-check"></i> <span id="toastMsg"></span>
    </div>

    <script>
        const WORKER_URL = "URL_WORKER_KAMU_DI_SINI"; // Masukkan URL Worker kamu
        let currentEmail = "";
        let isLocked = false;
        let checkInterval;

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('themeIcon').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }
        if (localStorage.theme === 'light') toggleTheme();

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.className = `fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white text-sm font-bold shadow-xl transition-all duration-300 z-[100] flex items-center gap-2 toast-active ${type === 'error' ? 'bg-red-500' : 'bg-gray-900'}`;
            setTimeout(() => t.classList.replace('toast-active', 'toast-enter'), 3000);
        }

        function genRandomEmail() {
            if (isLocked) return;
            document.getElementById('username').value = Math.random().toString(36).substring(2, 10);
            updateDisplay();
        }

        function updateDisplay() {
            const u = document.getElementById('username').value.trim();
            const d = document.getElementById('domain').value;
            document.getElementById('currentEmail').value = u ? `${u}@${d}` : "Siapkan Email Kamu...";
        }

        // LOGIKA ANTI-TABRAKAN (Uniqueness Check)
        async function toggleLock() {
            const u = document.getElementById('username').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            const d = document.getElementById('domain').value;
            const target = `${u}@${d}`;

            if (!u) return showToast("Isi username!", "error");

            if (!isLocked) {
                showToast("Mengecek ketersediaan...");
                try {
                    const res = await fetch(`${WORKER_URL}?action=lock&email=${target}`);
                    const data = await res.json();
                    
                    if (data.status === "taken") {
                        return showToast("Maaf, email ini sudah digunakan orang lain!", "error");
                    }
                } catch (e) { return showToast("Gagal koneksi server", "error"); }
            }

            isLocked = !isLocked;
            document.getElementById('username').disabled = isLocked;
            document.getElementById('domain').disabled = isLocked;
            document.getElementById('randomBtn').classList.toggle('hidden', isLocked);
            document.getElementById('deleteBtn').classList.toggle('hidden', !isLocked);
            document.getElementById('lockIcon').className = isLocked ? 'fa-solid fa-pencil' : 'fa-solid fa-check';
            document.getElementById('toggleLockBtn').classList.toggle('bg-orange-500', isLocked);
            
            if (isLocked) {
                currentEmail = target;
                showToast("Email Aktif!");
                document.getElementById('refreshStatus').classList.remove('hidden');
                startAutoRefresh();
            } else {
                clearInterval(checkInterval);
                document.getElementById('refreshStatus').classList.add('hidden');
                resetInbox();
            }
        }

        async function deleteSession() {
            if (!confirm("Hapus kotak masuk ini? Email akan bisa digunakan orang lain lagi.")) return;
            try {
                await fetch(`${WORKER_URL}?action=delete&email=${currentEmail}`);
                showToast("Kotak masuk dihapus!");
                isLocked = false;
                toggleLock(); // Reset UI
                document.getElementById('username').value = "";
                updateDisplay();
            } catch (e) { showToast("Gagal menghapus", "error"); }
        }

        function resetInbox() {
            document.getElementById('inboxList').innerHTML = `<div class="flex-1 flex flex-col items-center justify-center p-10 text-gray-400"><i class="fa-solid fa-pencil text-4xl mb-4 opacity-20"></i><p class="text-sm">Penyuntingan aktif...</p></div>`;
        }

        function startAutoRefresh() {
            checkInbox();
            checkInterval = setInterval(() => {
                if (document.hidden) return;
                checkInbox();
                const bar = document.getElementById('refreshBar');
                bar.classList.remove('animate-refresh-bar');
                void bar.offsetWidth;
                bar.classList.add('animate-refresh-bar');
            }, 5000);
        }

        async function checkInbox() {
            const [u, d] = currentEmail.split('@');
            try {
                let m = [];
                if (d.includes('akunin')) {
                    const res = await fetch(`${WORKER_URL}?email=${currentEmail}`);
                    m = await res.json();
                } else {
                    const res = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${u}&domain=${d}`);
                    m = await res.json();
                }
                renderInbox(m);
            } catch (e) {}
        }

        function renderInbox(data) {
            const list = document.getElementById('inboxList');
            if (data.length === 0) {
                list.innerHTML = `<div class="flex flex-col items-center justify-center h-64 text-gray-400 animate-pulse"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><p class="text-[10px] font-bold">MENUNGGU PESAN...</p></div>`;
                return;
            }
            list.innerHTML = data.map(m => `
                <div onclick="readEmail('${m.id}')" class="p-4 hover:bg-brand/5 cursor-pointer flex justify-between items-center transition-all border-l-4 border-transparent hover:border-brand">
                    <div class="min-w-0 flex-1">
                        <p class="text-brand font-bold text-xs truncate">${m.from}</p>
                        <p class="text-[11px] truncate mt-1">${m.subject}</p>
                    </div>
                    <span class="text-[9px] text-gray-400 font-mono ml-2">${m.date.split(',')[0]}</span>
                </div>
            `).join('');
        }

        async function readEmail(id) {
            showToast("Membuka pesan...");
            const [u, d] = currentEmail.split('@');
            let det;
            try {
                if (d.includes('akunin')) {
                    const res = await fetch(`${WORKER_URL}?email=${currentEmail}`);
                    const list = await res.json();
                    det = list.find(x => x.id === id);
                } else {
                    const res = await fetch(`https://www.1secmail.com/api/v1/?action=readMessage&login=${u}&domain=${d}&id=${id}`);
                    det = await res.json();
                }
                document.getElementById('readerView').classList.replace('hidden', 'flex');
                document.getElementById('msgSubject').innerText = det.subject;
                document.getElementById('msgFrom').innerText = det.from;
                document.getElementById('msgDate').innerText = det.date;
                // Tampilan Email Asli
                document.getElementById('msgBody').srcdoc = det.html || det.htmlBody || `<div style="font-family:sans-serif;padding:20px">${det.textBody}</div>`;
            } catch (e) { showToast("Gagal memuat", "error"); }
        }

        function closeReader() { document.getElementById('readerView').classList.replace('flex', 'hidden'); }
        function copyEmail() { navigator.clipboard.writeText(currentEmail); showToast("Email Disalin!"); }

        window.onload = () => {
            const p = window.location.pathname;
            if (p.startsWith('/mailbox/')) {
                const uUrl = p.split('/')[2];
                if (uUrl) {
                    document.getElementById('username').value = uUrl.split('@')[0];
                    updateDisplay();
                    toggleLock();
                }
            }
        };
        document.getElementById('username').addEventListener('input', updateDisplay);
        document.getElementById('domain').addEventListener('change', updateDisplay);
    </script>
</body>
</html>
