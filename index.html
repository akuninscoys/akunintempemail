<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKUNIN Temp Email</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] }, colors: { brand: { DEFAULT: '#3b82f6', dark: '#2563eb' } } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .toast-active { transform: translateY(0); opacity: 1; }
        .toast-enter { transform: translateY(100%); opacity: 0; }
        input:disabled, select:disabled { opacity: 0.6; cursor: not-allowed; }
        iframe { background: white; border-radius: 8px; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-950 dark:text-slate-200 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- HEADER KONTROL -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-3xl shadow-xl">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-bold flex items-center gap-3">
                    <div class="bg-brand p-2 rounded-xl text-white"><i class="fa-solid fa-envelope-open-text"></i></div>
                    AKUNIN TEMP
                </h1>
                <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-yellow-500">
                    <i id="themeIcon" class="fa-solid fa-moon"></i>
                </button>
            </div>
            
            <div class="mb-6 relative">
                <input type="text" id="currentEmail" readonly class="w-full p-5 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border-2 border-transparent text-brand font-mono text-lg sm:text-xl text-center outline-none" value="Siapkan Email Kamu...">
                <button onclick="copyEmail()" class="absolute right-3 top-3 bottom-3 px-6 bg-brand hover:bg-brand-dark text-white rounded-xl flex items-center gap-2 font-bold transition-all">
                    <i class="fa-regular fa-copy"></i> <span class="hidden sm:inline">Salin</span>
                </button>
            </div>

            <div class="flex flex-col sm:flex-row gap-4">
                <div class="flex-1 flex gap-3">
                    <input type="text" id="username" class="flex-1 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-5 py-3 outline-none focus:border-brand" placeholder="Username...">
                    <select id="domain" class="w-1/3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-3 py-3 outline-none cursor-pointer">
                        <option value="akunin.my.id">@akunin.my.id</option>
                        <option value="akunin.biz.id">@akunin.biz.id</option>
                        <option value="1secmail.com">@1secmail.com</option>
                    </select>
                </div>
                
                <div class="flex gap-3">
                    <button id="toggleLockBtn" onclick="toggleLock()" class="flex-1 sm:flex-none bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-xl shadow-md font-bold transition-all">
                        <i id="lockIcon" class="fa-solid fa-check"></i>
                    </button>
                    <button id="deleteBtn" onclick="deleteSession()" class="hidden flex-1 sm:flex-none bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-xl shadow-md transition-all">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                    <button id="randomBtn" onclick="genRandomEmail()" class="flex-1 sm:flex-none bg-slate-200 dark:bg-slate-800 px-6 py-3 rounded-xl font-bold group">
                        <i class="fa-solid fa-shuffle group-hover:rotate-180 transition-transform duration-500"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- INBOX AREA -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-xl min-h-[500px] flex flex-col relative overflow-hidden">
            <div id="inboxView" class="flex-1 flex flex-col">
                <div class="p-4 border-b dark:border-slate-800 flex justify-between items-center">
                    <span class="text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                        <i class="fa-solid fa-inbox text-brand"></i> Kotak Masuk
                    </span>
                    <div id="refreshStatus" class="hidden w-24 h-1.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                        <div class="h-full bg-brand animate-[progress_5s_linear_infinite]" id="refreshBar"></div>
                    </div>
                </div>
                <div id="inboxList" class="flex-1 flex flex-col divide-y dark:divide-slate-800">
                    <div class="flex-1 flex flex-col items-center justify-center p-10 text-slate-400">
                        <i class="fa-solid fa-lock text-5xl mb-4 opacity-20"></i>
                        <p class="text-sm">Klik centang untuk mengaktifkan kotak masuk.</p>
                    </div>
                </div>
            </div>

            <!-- READER VIEW (Full Frame)[cite: 1] -->
            <div id="readerView" class="hidden absolute inset-0 bg-white dark:bg-slate-900 z-50 flex flex-col">
                <div class="p-4 border-b dark:border-slate-800 flex items-center gap-4">
                    <button onclick="closeReader()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg"><i class="fa-solid fa-arrow-left"></i></button>
                    <h2 id="msgSubject" class="font-bold truncate text-lg flex-1">...</h2>
                </div>
                <div class="p-4 text-xs flex justify-between bg-slate-50 dark:bg-slate-800/50">
                    <p>Dari: <span id="msgFrom" class="text-brand font-bold">...</span></p>
                    <p id="msgDate" class="text-slate-500 font-mono">...</p>
                </div>
                <div class="flex-1 p-2 bg-slate-100 dark:bg-slate-950">
                    <iframe id="msgBody" sandbox="allow-same-origin"></iframe>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white text-sm font-bold shadow-2xl transition-all duration-300 toast-enter z-[100] flex items-center gap-2">
        <i class="fa-solid fa-bell"></i> <span id="toastMsg"></span>
    </div>

    <script>
        const WORKER_URL = "https://akunin-mail-api.akuninpremiumstore.workers.dev"; // GANTI DENGAN URL WORKER KAMU
        let currentEmail = "", isLocked = false, checkInterval;

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('themeIcon').className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        }
        if (localStorage.theme === 'light') toggleTheme();

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.className = `fixed bottom-6 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white text-sm font-bold shadow-2xl transition-all duration-300 z-[100] flex items-center gap-2 toast-active ${type === 'error' ? 'bg-red-500' : 'bg-slate-900'}`;
            setTimeout(() => t.classList.replace('toast-active', 'toast-enter'), 3000);
        }

        function genRandomEmail() {
            if (isLocked) return;
            document.getElementById('username').value = Math.random().toString(36).substring(2, 10);
            updateDisplay();
        }

        function updateDisplay() {
            const u = document.getElementById('username').value.trim();
            const d = document.getElementById('domain').value;
            document.getElementById('currentEmail').value = u ? `${u}@${d}` : "Siapkan Email Kamu...";
        }

        async function toggleLock() {
            const u = document.getElementById('username').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            const d = document.getElementById('domain').value;
            const target = `${u}@${d}`;

            if (!u) return showToast("Isi username!", "error");

            if (!isLocked) {
                showToast("Mengecek ketersediaan...");
                try {
                    const res = await fetch(`${WORKER_URL}?action=lock&email=${target}`);
                    const data = await res.json();
                    if (data.status === "taken") return showToast("Email sudah digunakan!", "error");
                } catch (e) { return showToast("Server tidak merespon", "error"); }
            }

            isLocked = !isLocked;
            document.getElementById('username').disabled = isLocked;
            document.getElementById('domain').disabled = isLocked;
            document.getElementById('randomBtn').classList.toggle('hidden', isLocked);
            document.getElementById('deleteBtn').classList.toggle('hidden', !isLocked);
            document.getElementById('lockIcon').className = isLocked ? 'fa-solid fa-pencil' : 'fa-solid fa-check';
            document.getElementById('toggleLockBtn').classList.toggle('bg-orange-500', isLocked);

            if (isLocked) {
                currentEmail = target;
                showToast("Email Aktif!");
                document.getElementById('refreshStatus').classList.remove('hidden');
                startAutoRefresh();
            } else {
                clearInterval(checkInterval);
                document.getElementById('refreshStatus').classList.add('hidden');
                resetInbox();
            }
        }

        async function deleteSession() {
            if (!confirm("Hapus kotak masuk ini?")) return;
            try {
                await fetch(`${WORKER_URL}?action=delete&email=${currentEmail}`);
                showToast("Dihapus!");
                location.reload();
            } catch (e) { showToast("Gagal hapus", "error"); }
        }

        function resetInbox() {
            document.getElementById('inboxList').innerHTML = `<div class="flex-1 flex flex-col items-center justify-center p-10 text-slate-400"><i class="fa-solid fa-pencil text-4xl mb-4 opacity-20"></i><p class="text-sm">Penyuntingan aktif...</p></div>`;
        }

        function startAutoRefresh() {
            checkInbox();
            checkInterval = setInterval(() => { if (!document.hidden) checkInbox(); }, 5000);
        }

        async function checkInbox() {
            const [u, d] = currentEmail.split('@');
            try {
                let m = [];
                if (d.includes('akunin')) {
                    const res = await fetch(`${WORKER_URL}?email=${currentEmail}`);
                    m = await res.json();
                } else {
                    const res = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${u}&domain=${d}`);
                    m = await res.json();
                }
                renderInbox(m);
            } catch (e) {}
        }

        function renderInbox(data) {
            const list = document.getElementById('inboxList');
            if (data.length === 0) {
                list.innerHTML = `<div class="flex flex-col items-center justify-center h-64 text-slate-400 animate-pulse"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><p class="text-xs font-bold uppercase tracking-widest">Mencari Pesan...</p></div>`;
                return;
            }
            list.innerHTML = data.map(m => `
                <div onclick="readEmail('${m.id}')" class="p-4 hover:bg-brand/5 cursor-pointer flex justify-between items-center transition-all border-l-4 border-transparent hover:border-brand">
                    <div class="min-w-0 flex-1">
                        <p class="text-brand font-bold text-sm truncate">${m.from}</p>
                        <p class="text-[13px] font-medium truncate mt-0.5">${m.subject}</p>
                    </div>
                    <span class="text-[10px] text-slate-400 font-mono ml-4 shrink-0">${m.date.split(',')[0]}</span>
                </div>
            `).join('');
        }

        async function readEmail(id) {
            showToast("Membuka pesan...");
            const [u, d] = currentEmail.split('@');
            let det;
            try {
                if (d.includes('akunin')) {
                    const res = await fetch(`${WORKER_URL}?email=${currentEmail}`);
                    const list = await res.json();
                    det = list.find(x => x.id === id);
                } else {
                    const res = await fetch(`https://www.1secmail.com/api/v1/?action=readMessage&login=${u}&domain=${d}&id=${id}`);
                    det = await res.json();
                }
                document.getElementById('readerView').classList.remove('hidden');
                document.getElementById('msgSubject').innerText = det.subject;
                document.getElementById('msgFrom').innerText = det.from;
                document.getElementById('msgDate').innerText = det.date;
                // RENDER ASLI: Menggunakan srcdoc agar HTML tidak berantakan[cite: 1]
                document.getElementById('msgBody').srcdoc = `<html><head><style>body{font-family:sans-serif;margin:20px;line-height:1.6;color:#333}img{max-width:100%}</style></head><body>${det.html || det.htmlBody || det.textBody}</body></html>`;
            } catch (e) { showToast("Gagal memuat", "error"); }
        }

        function closeReader() { document.getElementById('readerView').classList.add('hidden'); }
        function copyEmail() { navigator.clipboard.writeText(currentEmail); showToast("Alamat Disalin!"); }

        window.onload = () => {
            const p = window.location.pathname;
            if (p.startsWith('/mailbox/')) {
                const uUrl = p.split('/')[2];
                if (uUrl) {
                    document.getElementById('username').value = uUrl.split('@')[0];
                    updateDisplay(); toggleLock();
                }
            }
        };
        document.getElementById('username').addEventListener('input', updateDisplay);
        document.getElementById('domain').addEventListener('change', updateDisplay);
    </script>
</body>
</html>
